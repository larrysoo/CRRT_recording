<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="CRRT Recorder logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c1d6"/>
      <stop offset="1" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="drop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d8f3fb"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#00304e" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- app tile -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="116" fill="#ffffff" opacity="0.06"/>

  <!-- continuous circulation loop (two arcs + arrowheads) -->
  <g fill="none" stroke="#bdeff9" stroke-width="26" stroke-linecap="round" opacity="0.95">
    <!-- bottom arc: right(θ=20°) -> bottom -> left(θ=160°) -->
    <path d="M 421 316 A 176 176 0 0 1 91 316"/>
    <!-- top arc: left(θ=200°) -> top -> right(θ=340°) -->
    <path d="M 91 196 A 176 176 0 0 1 421 196"/>
  </g>
  <!-- arrowheads showing clockwise flow -->
  <g fill="#bdeff9">
    <!-- head at left end of bottom arc, pointing up (continuing the loop) -->
    <path d="M 91 316 l -22 -14 l 30 -12 l 8 33 z"/>
    <!-- head at right end of top arc, pointing down -->
    <path d="M 421 196 l 22 14 l -30 12 l -8 -33 z"/>
  </g>

  <!-- fluid droplet -->
  <path filter="url(#sh)" fill="url(#drop)"
        d="M 256 150
           C 300 214 332 250 332 300
           a 76 76 0 1 1 -152 0
           C 180 250 212 214 256 150 Z"/>

  <!-- droplet inner detail: subtle pulse / flow line -->
  <path d="M 214 300 h 26 l 12 -26 l 18 46 l 12 -20 h 20"
        fill="none" stroke="#0891b2" stroke-width="11"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <!-- droplet highlight -->
  <ellipse cx="230" cy="250" rx="15" ry="24" fill="#ffffff" opacity="0.55" transform="rotate(-18 230 250)"/>
</svg>
